<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IncaSlop Switcher — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    .hidden { display: none !important; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #94a3b8;
      font-size: 0.8rem;
    }

    .btn-muted {
      background: #374151;
      color: #e2e8f0;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 12px;
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.streaming { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.stopped   { background: #475569; }
    .dot.starting  { background: #f59e0b; }
    .dot.error     { background: #ef4444; box-shadow: 0 0 6px #ef4444; }

    #status-text {
      font-weight: 600;
      font-size: 0.95rem;
    }

    #current-url {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #94a3b8;
      word-break: break-all;
    }

    #current-url a {
      color: #60a5fa;
      text-decoration: none;
    }
    #current-url a:hover { text-decoration: underline; }

    #uptime {
      margin-top: 4px;
      font-size: 0.75rem;
      color: #475569;
    }

    /* Switch form */
    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="password"] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #3b82f6; }

    #overlay-input {
      width: 100%;
      margin-bottom: 10px;
    }
    #overlay-style {
      width: 100%;
      margin-bottom: 10px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #overlay-style:focus { border-color: #3b82f6; }

    #overlay-status {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 10px;
      min-height: 1em;
    }

    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary  { background: #3b82f6; color: #fff; }
    .btn-success  { background: #22c55e; color: #fff; }
    .btn-danger   { background: #ef4444; color: #fff; }
    button:not(:disabled):hover { opacity: 0.85; }

    /* Controls */
    .controls-row {
      display: flex;
      gap: 10px;
    }

    /* Playlist */
    input[type="number"] {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus { border-color: #3b82f6; }

    .pl-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #0f1117;
      font-size: 0.8rem;
    }
    .pl-item.active { background: #1e3a5f; border: 1px solid #3b82f6; }
    .pl-item .pl-url {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #94a3b8;
    }
    .pl-item.active .pl-url { color: #60a5fa; }
    .pl-item .pl-dur { color: #475569; font-size: 0.75rem; flex-shrink: 0; }
    .pl-item .pl-del {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      padding: 2px 6px;
      flex-shrink: 0;
      font-size: 0.875rem;
    }

    /* Log */
    #log {
      background: #0a0c12;
      border: 1px solid #1e2235;
      border-radius: 6px;
      padding: 12px;
      height: 180px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.75rem;
      color: #64748b;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #login-modal {
      position: fixed;
      inset: 0;
      background: rgba(10, 12, 18, 0.84);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: #151926;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .login-box h2 {
      font-size: 1rem;
      color: #fff;
      margin-bottom: 8px;
    }

    .login-box p {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .login-form-row { margin-bottom: 10px; }

    .login-form-row input {
      width: 100%;
    }

    #login-error {
      min-height: 1em;
      color: #f87171;
      font-size: 0.8rem;
      margin-top: 2px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div id="login-modal">
    <div class="login-box">
      <h2>Iniciar sesión</h2>
      <p>Acceso interno al switcher.</p>
      <form id="login-form">
        <div class="login-form-row">
          <input type="text" id="login-username" placeholder="Usuario" autocomplete="username" required />
        </div>
        <div class="login-form-row">
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
        </div>
        <div id="login-error"></div>
        <button class="btn-primary" type="submit" id="btn-login">Entrar</button>
      </form>
    </div>
  </div>

  <div id="app-shell" class="hidden">
  <div class="topbar">
    <h1>IncaSlop Switcher</h1>
    <div class="topbar-right">
      <span id="session-user">—</span>
      <button class="btn-muted" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>

  <!-- Status -->
  <div class="card">
    <h2>Estado del stream</h2>
    <div class="status-row">
      <div class="dot stopped" id="status-dot"></div>
      <span id="status-text">Cargando...</span>
    </div>
    <div id="current-url">—</div>
    <div id="uptime"></div>
  </div>

  <!-- Switch URL -->
  <div class="card">
    <h2>Cambiar URL</h2>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://..." />
      <button class="btn-primary" id="btn-switch" onclick="doSwitch()">Switch</button>
    </div>
  </div>

  <!-- Overlay messages -->
  <div class="card">
    <h2>Mensajes Overlay</h2>
    <input type="text" id="overlay-input" maxlength="180" placeholder="Escribe el mensaje para mostrar en Kick..." />
    <select id="overlay-style">
      <option value="neon-burst">Neon Burst</option>
      <option value="acid-fire">Acid Fire</option>
      <option value="pixel-rave">Pixel Rave</option>
      <option value="cosmic-pop">Cosmic Pop</option>
      <option value="warning-siren">Warning Siren</option>
    </select>
    <div id="overlay-status">Sin mensaje activo</div>
    <div class="controls-row">
      <button class="btn-primary" onclick="overlayShow()">Mostrar mensaje</button>
      <button class="btn-danger" onclick="overlayClear()">Ocultar ahora</button>
    </div>
  </div>

  <!-- Sticker GIF -->
  <div class="card">
    <h2>Sticker GIF</h2>
    <input type="text" id="sticker-gif-input" placeholder="https://.../sticker.gif" />
    <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 8px; margin-bottom: 10px;">
      Se aceptan solo URLs públicas terminadas en <code>.gif</code>.
    </div>
    <div class="controls-row">
      <button class="btn-primary" onclick="stickerShow()">Lanzar sticker</button>
    </div>
  </div>

  <!-- Playlist -->
  <div class="card">
    <h2>Playlist</h2>
    <div class="input-row" style="gap: 8px; margin-bottom: 12px;">
      <input type="text"   id="pl-url"      placeholder="https://..." />
      <input type="number" id="pl-duracion" placeholder="seg" min="5" style="width: 80px; flex: none;" />
      <button class="btn-primary" onclick="plAdd()">+ Agregar</button>
    </div>
    <div id="pl-list"></div>
    <div id="pl-status" style="font-size: 0.8rem; color: #94a3b8; margin: 8px 0;"></div>
    <div class="controls-row">
      <button class="btn-success" onclick="plStart()">▶ Iniciar</button>
      <button class="btn-primary"  onclick="plPause()">⏸ Pausar</button>
      <button class="btn-danger"   onclick="plStop()">■ Detener</button>
      <button style="background: #374151; color: #e2e8f0; padding: 8px 16px; border-radius: 6px; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer;" onclick="plClear()">✕ Limpiar</button>
    </div>
  </div>

  <!-- Stream controls -->
  <div class="card">
    <h2>Audio</h2>
    <div id="audio-summary" style="font-size: 0.85rem; color: #cbd5e1;">Cargando...</div>
    <div id="audio-track" style="font-size: 0.8rem; color: #94a3b8; margin-top: 6px;"></div>
    <div id="audio-meta" style="font-size: 0.75rem; color: #64748b; margin-top: 4px;"></div>
    <div id="audio-warnings" style="font-size: 0.75rem; color: #f59e0b; margin-top: 8px;"></div>
    <div style="margin-top: 12px;">
      <button class="btn-primary" onclick="rescanAudio()">↻ Recargar carpeta</button>
    </div>
  </div>

  <!-- Stream controls -->
  <div class="card">
    <h2>Controles</h2>
    <div class="controls-row">
      <button class="btn-success" id="btn-start" onclick="doStart()">▶ Start Stream</button>
      <button class="btn-danger"  id="btn-stop"  onclick="doStop()">■ Stop Stream</button>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <h2>Log</h2>
    <pre id="log"></pre>
  </div>
  </div>

  <script src="config.js"></script>
  <script>
    const API   = (window.SWITCHER_API   || 'http://localhost:3000').replace(/\/$/, '')
    const SESSION_STORAGE_KEY = 'incaslop.switcher.session'
    let SESSION_TOKEN = ''
    let POLL_TIMER = null

    async function apiFetch(path, options = {}) {
      const { suppressAuthRedirect = false, ...requestOptions } = options
      const res = await fetch(API + path, {
        headers: {
          'Content-Type': 'application/json',
          ...(SESSION_TOKEN ? { 'Authorization': 'Bearer ' + SESSION_TOKEN } : {}),
          ...(requestOptions.headers || {}),
        },
        ...requestOptions,
      })
      const text = await res.text()
      let data
      try { data = JSON.parse(text) } catch { data = { error: text } }
      if (res.status === 401 && !suppressAuthRedirect) {
        await handleUnauthorized()
      }
      if (!res.ok) throw new Error(data.error || res.statusText)
      return data
    }

    function saveSession(session) {
      localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(session))
    }

    function readStoredSession() {
      const raw = localStorage.getItem(SESSION_STORAGE_KEY)
      if (!raw) return null
      try { return JSON.parse(raw) } catch { return null }
    }

    function clearSession() {
      SESSION_TOKEN = ''
      localStorage.removeItem(SESSION_STORAGE_KEY)
      clearInterval(POLL_TIMER)
      POLL_TIMER = null
    }

    function showLogin() {
      document.getElementById('login-modal').classList.remove('hidden')
      document.getElementById('app-shell').classList.add('hidden')
      document.getElementById('login-password').value = ''
    }

    function showApp(user) {
      document.getElementById('session-user').textContent = user ? `Usuario: ${user}` : 'Usuario: —'
      document.getElementById('login-modal').classList.add('hidden')
      document.getElementById('app-shell').classList.remove('hidden')
    }

    function setLoginError(message = '') {
      document.getElementById('login-error').textContent = message
    }

    function setLoginBusy(busy) {
      document.getElementById('btn-login').disabled = !!busy
    }

    async function handleUnauthorized() {
      clearSession()
      showLogin()
      setLoginError('Sesión expirada. Vuelve a iniciar sesión.')
      document.getElementById('status-dot').className = 'dot error'
      document.getElementById('status-text').textContent = 'No autenticado'
    }

    async function verifySession() {
      const data = await apiFetch('/auth/session', { method: 'GET', suppressAuthRedirect: true })
      const user = data?.user || 'inca'
      saveSession({ token: SESSION_TOKEN, user, expiresAt: data?.expiresAt || null })
      showApp(user)
      await pollStatus()
      startPolling()
    }

    function startPolling() {
      clearInterval(POLL_TIMER)
      POLL_TIMER = setInterval(pollStatus, 5000)
    }

    async function bootstrapAuth() {
      const stored = readStoredSession()
      if (!stored?.token) {
        showLogin()
        return
      }

      SESSION_TOKEN = stored.token
      try {
        await verifySession()
      } catch {
        clearSession()
        showLogin()
      }
    }

    async function doLogin(event) {
      event.preventDefault()
      const username = document.getElementById('login-username').value.trim()
      const password = document.getElementById('login-password').value
      if (!username || !password) return setLoginError('Completa usuario y password.')

      setLoginBusy(true)
      setLoginError('')
      try {
        const data = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        }).then(async (res) => {
          const text = await res.text()
          let body
          try { body = JSON.parse(text) } catch { body = { error: text } }
          if (!res.ok) throw new Error(body.error || res.statusText)
          return body
        })

        SESSION_TOKEN = data.token
        saveSession({ token: data.token, user: data.user, expiresAt: data.expiresAt || null })
        showApp(data.user)
        log('Sesión iniciada')
        await pollStatus()
        startPolling()
      } catch (e) {
        setLoginError(e.message || 'No se pudo iniciar sesión')
      } finally {
        setLoginBusy(false)
      }
    }

    async function doLogout() {
      try {
        if (SESSION_TOKEN) {
          await apiFetch('/auth/logout', { method: 'POST', suppressAuthRedirect: true })
        }
      } catch {}
      clearSession()
      showLogin()
      setLoginError('')
      log('Sesión cerrada')
    }

    function log(msg) {
      const el = document.getElementById('log')
      const ts = new Date().toLocaleTimeString('es-PE')
      el.textContent += `[${ts}] ${msg}\n`
      el.scrollTop = el.scrollHeight
    }

    function formatUptime(s) {
      if (!s) return ''
      const h = Math.floor(s / 3600)
      const m = Math.floor((s % 3600) / 60)
      const sec = s % 60
      return `Uptime: ${h}h ${m}m ${sec}s`
    }

    function updateUI(data) {
      const dot    = document.getElementById('status-dot')
      const text   = document.getElementById('status-text')
      const urlEl  = document.getElementById('current-url')
      const uptEl  = document.getElementById('uptime')

      dot.className = 'dot ' + (data.status || 'stopped')

      const labels = { streaming: 'Streameando', stopped: 'Detenido', starting: 'Iniciando...', error: 'Error' }
      text.textContent = labels[data.status] || data.status

      if (data.currentUrl) {
        urlEl.innerHTML = `<a href="${data.currentUrl}" target="_blank" rel="noopener">${data.currentUrl}</a>`
        document.getElementById('url-input').value = data.currentUrl
      } else {
        urlEl.textContent = '—'
      }

      uptEl.textContent = formatUptime(data.uptimeSeconds)
      updatePlaylistUI(data)
      updateAudioUI(data.audio)
      updateOverlayUI(data.overlay)
    }

    async function pollStatus() {
      try {
        const data = await apiFetch('/status')
        updateUI(data)
      } catch (e) {
        if (!SESSION_TOKEN) return
        document.getElementById('status-dot').className = 'dot error'
        document.getElementById('status-text').textContent = 'Sin conexión'
      }
    }

    async function doSwitch() {
      const url = document.getElementById('url-input').value.trim()
      if (!url) return
      try {
        log(`Cambiando a: ${url}`)
        await apiFetch('/switch', { method: 'POST', body: JSON.stringify({ url }) })
        log('URL cambiada correctamente')
        pollStatus()
      } catch (e) {
        log('Error al cambiar URL: ' + e.message)
      }
    }

    async function doStart() {
      try {
        log('Iniciando stream...')
        await apiFetch('/stream/start', { method: 'POST' })
        log('Stream iniciado')
        pollStatus()
      } catch (e) {
        log('Error al iniciar: ' + e.message)
      }
    }

    async function doStop() {
      try {
        log('Deteniendo stream...')
        await apiFetch('/stream/stop', { method: 'POST' })
        log('Stream detenido')
        pollStatus()
      } catch (e) {
        log('Error al detener: ' + e.message)
      }
    }

    // Enter key in URL input triggers switch
    document.getElementById('url-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSwitch()
    })

    // --- Overlay ---
    const OVERLAY_STYLE_LABELS = {
      'neon-burst': 'Neon Burst',
      'acid-fire': 'Acid Fire',
      'pixel-rave': 'Pixel Rave',
      'cosmic-pop': 'Cosmic Pop',
      'warning-siren': 'Warning Siren',
    }

    function getOverlayStyleLabel(style) {
      return OVERLAY_STYLE_LABELS[style] || OVERLAY_STYLE_LABELS['neon-burst']
    }

    function updateOverlayUI(overlay) {
      const status = document.getElementById('overlay-status')
      const styleInput = document.getElementById('overlay-style')
      if (overlay?.style && styleInput) {
        styleInput.value = overlay.style
      }
      if (!overlay || !overlay.visible) {
        status.textContent = 'Sin mensaje activo'
        return
      }

      const ms = Math.max(0, (overlay.expiresAt || 0) - Date.now())
      const sec = Math.ceil(ms / 1000)
      status.textContent = `Activo (${sec}s · ${getOverlayStyleLabel(overlay.style)}): ${overlay.text || ''}`
    }

    async function overlayShow() {
      const text = document.getElementById('overlay-input').value.trim()
      const style = document.getElementById('overlay-style').value
      if (!text) return log('Overlay: el mensaje es requerido')

      try {
        const data = await apiFetch('/overlay/message', {
          method: 'POST',
          body: JSON.stringify({ text, style }),
        })
        log(`Overlay: mensaje enviado con estilo ${getOverlayStyleLabel(style)}`)
        updateOverlayUI(data.overlay)
        pollStatus()
      } catch (e) {
        log('Overlay error: ' + e.message)
      }
    }

    async function overlayClear() {
      try {
        const data = await apiFetch('/overlay/clear', { method: 'POST' })
        log('Overlay: mensaje ocultado')
        updateOverlayUI(data.overlay)
        pollStatus()
      } catch (e) {
        log('Overlay error: ' + e.message)
      }
    }

    document.getElementById('overlay-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') overlayShow()
    })

    // --- Sticker GIF ---
    async function stickerShow() {
      const gifUrl = document.getElementById('sticker-gif-input').value.trim()
      if (!gifUrl) return log('Sticker: URL GIF requerida')

      try {
        await apiFetch('/overlay/sticker', {
          method: 'POST',
          body: JSON.stringify({ gifUrl }),
        })
        log('Sticker: enviado a transmisión')
      } catch (e) {
        log('Sticker error: ' + e.message)
      }
    }

    document.getElementById('sticker-gif-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') stickerShow()
    })

    // --- Playlist ---
    let _plItems = [], _plState = 'idle', _plCurrentIndex = null,
        _plRemainingMs = null, _plCountdown = null

    function updatePlaylistUI(data) {
      if (!data.items) return
      _plItems = data.items
      _plState = data.playlistState
      _plCurrentIndex = data.currentIndex
      _plRemainingMs = data.remainingMs
      renderPlList()
      renderPlStatus()
    }

    function renderPlList() {
      const container = document.getElementById('pl-list')
      if (_plItems.length === 0) {
        container.innerHTML = '<div style="color:#475569; font-size:0.8rem; padding: 4px 0;">Lista vacía</div>'
        return
      }
      container.innerHTML = _plItems.map((item) => `
        <div class="pl-item ${item.active ? 'active' : ''}">
          <span class="pl-url" title="${item.url}">${item.url}</span>
          <span class="pl-dur">${item.duracionSegundos}s</span>
          <button class="pl-del" onclick="plRemove('${item.id}')">✕</button>
        </div>
      `).join('')
    }

    function renderPlStatus() {
      clearInterval(_plCountdown)
      const el = document.getElementById('pl-status')
      if (_plState === 'idle') { el.textContent = 'Playlist inactiva'; return }
      if (_plState === 'paused') {
        const sec = _plRemainingMs !== null ? Math.ceil(_plRemainingMs / 1000) : '?'
        el.textContent = `Pausado — ${sec}s restantes`
        return
      }
      // running — countdown local entre polls
      let ms = _plRemainingMs ?? 0
      const total = _plItems.length
      const idx = (_plCurrentIndex ?? 0) + 1
      function tick() {
        const sec = Math.max(0, Math.ceil(ms / 1000))
        el.textContent = `Item ${idx}/${total} — ${sec}s restantes`
        ms -= 500
        if (ms <= 0) clearInterval(_plCountdown)
      }
      tick()
      _plCountdown = setInterval(tick, 500)
    }

    async function plAdd() {
      const url = document.getElementById('pl-url').value.trim()
      const dur = parseInt(document.getElementById('pl-duracion').value, 10)
      if (!url) return log('Playlist: URL es requerida')
      if (!dur || dur < 5) return log('Playlist: duración debe ser >= 5 segundos')
      try {
        await apiFetch('/playlist/items', { method: 'POST', body: JSON.stringify({ url, duracionSegundos: dur }) })
        document.getElementById('pl-url').value = ''
        document.getElementById('pl-duracion').value = ''
        log(`Playlist: agregado ${url} (${dur}s)`)
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    async function plRemove(id) {
      try {
        await apiFetch('/playlist/items/' + id, { method: 'DELETE' })
        pollStatus()
      } catch (e) { log('Playlist error al eliminar: ' + e.message) }
    }

    async function plClear() {
      try {
        await apiFetch('/playlist/items', { method: 'DELETE' })
        log('Playlist: lista limpiada')
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    async function plStart() {
      try {
        await apiFetch('/playlist/start', { method: 'POST' })
        log('Playlist: iniciada')
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    async function plPause() {
      try {
        await apiFetch('/playlist/pause', { method: 'POST' })
        log('Playlist: pausada')
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    async function plStop() {
      try {
        await apiFetch('/playlist/stop', { method: 'POST' })
        log('Playlist: detenida')
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    function updateAudioUI(audio) {
      const summary = document.getElementById('audio-summary')
      const track = document.getElementById('audio-track')
      const meta = document.getElementById('audio-meta')
      const warnings = document.getElementById('audio-warnings')

      if (!audio) {
        summary.textContent = 'Audio no disponible'
        track.textContent = ''
        meta.textContent = ''
        warnings.textContent = ''
        return
      }

      const enabledLabel = audio.enabled ? 'Audio loop activo' : 'Sin audio (video-only)'
      summary.textContent = `${enabledLabel} · ${audio.trackCount || 0} pista(s)`

      if (audio.currentTrack) {
        const dur = audio.currentTrack.durationSec ? ` (${Math.round(audio.currentTrack.durationSec)}s)` : ''
        track.textContent = `Pista actual: ${audio.currentTrack.index + 1}. ${audio.currentTrack.name}${dur}`
      } else {
        track.textContent = 'Pista actual: —'
      }

      const scanText = audio.lastScanAt ? new Date(audio.lastScanAt).toLocaleString('es-PE') : '—'
      meta.textContent = `Último escaneo: ${scanText}`

      warnings.textContent = Array.isArray(audio.warnings) && audio.warnings.length
        ? audio.warnings.join(' | ')
        : ''
    }

    async function rescanAudio() {
      try {
        const data = await apiFetch('/audio/rescan', { method: 'POST' })
        log('Audio: carpeta recargada')
        updateAudioUI(data.audio)
        pollStatus()
      } catch (e) {
        log('Audio error: ' + e.message)
      }
    }

    document.getElementById('login-form').addEventListener('submit', doLogin)
    bootstrapAuth()
  </script>
</body>
</html>
