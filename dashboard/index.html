<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IncaSlop Switcher — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 12px;
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.streaming { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.stopped   { background: #475569; }
    .dot.starting  { background: #f59e0b; }
    .dot.error     { background: #ef4444; box-shadow: 0 0 6px #ef4444; }

    #status-text {
      font-weight: 600;
      font-size: 0.95rem;
    }

    #current-url {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #94a3b8;
      word-break: break-all;
    }

    #current-url a {
      color: #60a5fa;
      text-decoration: none;
    }
    #current-url a:hover { text-decoration: underline; }

    #uptime {
      margin-top: 4px;
      font-size: 0.75rem;
      color: #475569;
    }

    /* Switch form */
    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #3b82f6; }

    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary  { background: #3b82f6; color: #fff; }
    .btn-success  { background: #22c55e; color: #fff; }
    .btn-danger   { background: #ef4444; color: #fff; }
    button:not(:disabled):hover { opacity: 0.85; }

    /* Controls */
    .controls-row {
      display: flex;
      gap: 10px;
    }

    /* Playlist */
    input[type="number"] {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus { border-color: #3b82f6; }

    .pl-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #0f1117;
      font-size: 0.8rem;
    }
    .pl-item.active { background: #1e3a5f; border: 1px solid #3b82f6; }
    .pl-item .pl-url {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #94a3b8;
    }
    .pl-item.active .pl-url { color: #60a5fa; }
    .pl-item .pl-dur { color: #475569; font-size: 0.75rem; flex-shrink: 0; }
    .pl-item .pl-del {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      padding: 2px 6px;
      flex-shrink: 0;
      font-size: 0.875rem;
    }

    /* Log */
    #log {
      background: #0a0c12;
      border: 1px solid #1e2235;
      border-radius: 6px;
      padding: 12px;
      height: 180px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.75rem;
      color: #64748b;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>IncaSlop Switcher</h1>

  <!-- Status -->
  <div class="card">
    <h2>Estado del stream</h2>
    <div class="status-row">
      <div class="dot stopped" id="status-dot"></div>
      <span id="status-text">Cargando...</span>
    </div>
    <div id="current-url">—</div>
    <div id="uptime"></div>
  </div>

  <!-- Switch URL -->
  <div class="card">
    <h2>Cambiar URL</h2>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://..." />
      <button class="btn-primary" id="btn-switch" onclick="doSwitch()">Switch</button>
    </div>
  </div>

  <!-- Playlist -->
  <div class="card">
    <h2>Playlist</h2>
    <div class="input-row" style="gap: 8px; margin-bottom: 12px;">
      <input type="text"   id="pl-url"      placeholder="https://..." />
      <input type="number" id="pl-duracion" placeholder="seg" min="5" style="width: 80px; flex: none;" />
      <button class="btn-primary" onclick="plAdd()">+ Agregar</button>
    </div>
    <div id="pl-list"></div>
    <div id="pl-status" style="font-size: 0.8rem; color: #94a3b8; margin: 8px 0;"></div>
    <div class="controls-row">
      <button class="btn-success" onclick="plStart()">▶ Iniciar</button>
      <button class="btn-primary"  onclick="plPause()">⏸ Pausar</button>
      <button class="btn-danger"   onclick="plStop()">■ Detener</button>
      <button style="background: #374151; color: #e2e8f0; padding: 8px 16px; border-radius: 6px; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer;" onclick="plClear()">✕ Limpiar</button>
    </div>
  </div>

  <!-- Stream controls -->
  <div class="card">
    <h2>Audio</h2>
    <div id="audio-summary" style="font-size: 0.85rem; color: #cbd5e1;">Cargando...</div>
    <div id="audio-track" style="font-size: 0.8rem; color: #94a3b8; margin-top: 6px;"></div>
    <div id="audio-meta" style="font-size: 0.75rem; color: #64748b; margin-top: 4px;"></div>
    <div id="audio-warnings" style="font-size: 0.75rem; color: #f59e0b; margin-top: 8px;"></div>
    <div style="margin-top: 12px;">
      <button class="btn-primary" onclick="rescanAudio()">↻ Recargar carpeta</button>
    </div>
  </div>

  <!-- Stream controls -->
  <div class="card">
    <h2>Controles</h2>
    <div class="controls-row">
      <button class="btn-success" id="btn-start" onclick="doStart()">▶ Start Stream</button>
      <button class="btn-danger"  id="btn-stop"  onclick="doStop()">■ Stop Stream</button>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <h2>Log</h2>
    <pre id="log"></pre>
  </div>

  <script src="config.js"></script>
  <script>
    const API   = (window.SWITCHER_API   || 'http://localhost:3000').replace(/\/$/, '')
    const TOKEN = window.SWITCHER_TOKEN  || ''

    async function apiFetch(path, options = {}) {
      const res = await fetch(API + path, {
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + TOKEN,
          ...(options.headers || {}),
        },
        ...options,
      })
      const text = await res.text()
      let data
      try { data = JSON.parse(text) } catch { data = { error: text } }
      if (!res.ok) throw new Error(data.error || res.statusText)
      return data
    }

    function log(msg) {
      const el = document.getElementById('log')
      const ts = new Date().toLocaleTimeString('es-PE')
      el.textContent += `[${ts}] ${msg}\n`
      el.scrollTop = el.scrollHeight
    }

    function formatUptime(s) {
      if (!s) return ''
      const h = Math.floor(s / 3600)
      const m = Math.floor((s % 3600) / 60)
      const sec = s % 60
      return `Uptime: ${h}h ${m}m ${sec}s`
    }

    function updateUI(data) {
      const dot    = document.getElementById('status-dot')
      const text   = document.getElementById('status-text')
      const urlEl  = document.getElementById('current-url')
      const uptEl  = document.getElementById('uptime')

      dot.className = 'dot ' + (data.status || 'stopped')

      const labels = { streaming: 'Streameando', stopped: 'Detenido', starting: 'Iniciando...', error: 'Error' }
      text.textContent = labels[data.status] || data.status

      if (data.currentUrl) {
        urlEl.innerHTML = `<a href="${data.currentUrl}" target="_blank" rel="noopener">${data.currentUrl}</a>`
        document.getElementById('url-input').value = data.currentUrl
      } else {
        urlEl.textContent = '—'
      }

      uptEl.textContent = formatUptime(data.uptimeSeconds)
      updatePlaylistUI(data)
      updateAudioUI(data.audio)
    }

    async function pollStatus() {
      try {
        const data = await apiFetch('/status')
        updateUI(data)
      } catch (e) {
        document.getElementById('status-dot').className = 'dot error'
        document.getElementById('status-text').textContent = 'Sin conexión'
      }
    }

    async function doSwitch() {
      const url = document.getElementById('url-input').value.trim()
      if (!url) return
      try {
        log(`Cambiando a: ${url}`)
        await apiFetch('/switch', { method: 'POST', body: JSON.stringify({ url }) })
        log('URL cambiada correctamente')
        pollStatus()
      } catch (e) {
        log('Error al cambiar URL: ' + e.message)
      }
    }

    async function doStart() {
      try {
        log('Iniciando stream...')
        await apiFetch('/stream/start', { method: 'POST' })
        log('Stream iniciado')
        pollStatus()
      } catch (e) {
        log('Error al iniciar: ' + e.message)
      }
    }

    async function doStop() {
      try {
        log('Deteniendo stream...')
        await apiFetch('/stream/stop', { method: 'POST' })
        log('Stream detenido')
        pollStatus()
      } catch (e) {
        log('Error al detener: ' + e.message)
      }
    }

    // Enter key in URL input triggers switch
    document.getElementById('url-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSwitch()
    })

    // --- Playlist ---
    let _plItems = [], _plState = 'idle', _plCurrentIndex = null,
        _plRemainingMs = null, _plCountdown = null

    function updatePlaylistUI(data) {
      if (!data.items) return
      _plItems = data.items
      _plState = data.playlistState
      _plCurrentIndex = data.currentIndex
      _plRemainingMs = data.remainingMs
      renderPlList()
      renderPlStatus()
    }

    function renderPlList() {
      const container = document.getElementById('pl-list')
      if (_plItems.length === 0) {
        container.innerHTML = '<div style="color:#475569; font-size:0.8rem; padding: 4px 0;">Lista vacía</div>'
        return
      }
      container.innerHTML = _plItems.map((item) => `
        <div class="pl-item ${item.active ? 'active' : ''}">
          <span class="pl-url" title="${item.url}">${item.url}</span>
          <span class="pl-dur">${item.duracionSegundos}s</span>
          <button class="pl-del" onclick="plRemove('${item.id}')">✕</button>
        </div>
      `).join('')
    }

    function renderPlStatus() {
      clearInterval(_plCountdown)
      const el = document.getElementById('pl-status')
      if (_plState === 'idle') { el.textContent = 'Playlist inactiva'; return }
      if (_plState === 'paused') {
        const sec = _plRemainingMs !== null ? Math.ceil(_plRemainingMs / 1000) : '?'
        el.textContent = `Pausado — ${sec}s restantes`
        return
      }
      // running — countdown local entre polls
      let ms = _plRemainingMs ?? 0
      const total = _plItems.length
      const idx = (_plCurrentIndex ?? 0) + 1
      function tick() {
        const sec = Math.max(0, Math.ceil(ms / 1000))
        el.textContent = `Item ${idx}/${total} — ${sec}s restantes`
        ms -= 500
        if (ms <= 0) clearInterval(_plCountdown)
      }
      tick()
      _plCountdown = setInterval(tick, 500)
    }

    async function plAdd() {
      const url = document.getElementById('pl-url').value.trim()
      const dur = parseInt(document.getElementById('pl-duracion').value, 10)
      if (!url) return log('Playlist: URL es requerida')
      if (!dur || dur < 5) return log('Playlist: duración debe ser >= 5 segundos')
      try {
        await apiFetch('/playlist/items', { method: 'POST', body: JSON.stringify({ url, duracionSegundos: dur }) })
        document.getElementById('pl-url').value = ''
        document.getElementById('pl-duracion').value = ''
        log(`Playlist: agregado ${url} (${dur}s)`)
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    async function plRemove(id) {
      try {
        await apiFetch('/playlist/items/' + id, { method: 'DELETE' })
        pollStatus()
      } catch (e) { log('Playlist error al eliminar: ' + e.message) }
    }

    async function plClear() {
      try {
        await apiFetch('/playlist/items', { method: 'DELETE' })
        log('Playlist: lista limpiada')
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    async function plStart() {
      try {
        await apiFetch('/playlist/start', { method: 'POST' })
        log('Playlist: iniciada')
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    async function plPause() {
      try {
        await apiFetch('/playlist/pause', { method: 'POST' })
        log('Playlist: pausada')
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    async function plStop() {
      try {
        await apiFetch('/playlist/stop', { method: 'POST' })
        log('Playlist: detenida')
        pollStatus()
      } catch (e) { log('Playlist error: ' + e.message) }
    }

    function updateAudioUI(audio) {
      const summary = document.getElementById('audio-summary')
      const track = document.getElementById('audio-track')
      const meta = document.getElementById('audio-meta')
      const warnings = document.getElementById('audio-warnings')

      if (!audio) {
        summary.textContent = 'Audio no disponible'
        track.textContent = ''
        meta.textContent = ''
        warnings.textContent = ''
        return
      }

      const enabledLabel = audio.enabled ? 'Audio loop activo' : 'Sin audio (video-only)'
      summary.textContent = `${enabledLabel} · ${audio.trackCount || 0} pista(s)`

      if (audio.currentTrack) {
        const dur = audio.currentTrack.durationSec ? ` (${Math.round(audio.currentTrack.durationSec)}s)` : ''
        track.textContent = `Pista actual: ${audio.currentTrack.index + 1}. ${audio.currentTrack.name}${dur}`
      } else {
        track.textContent = 'Pista actual: —'
      }

      const scanText = audio.lastScanAt ? new Date(audio.lastScanAt).toLocaleString('es-PE') : '—'
      meta.textContent = `Último escaneo: ${scanText}`

      warnings.textContent = Array.isArray(audio.warnings) && audio.warnings.length
        ? audio.warnings.join(' | ')
        : ''
    }

    async function rescanAudio() {
      try {
        const data = await apiFetch('/audio/rescan', { method: 'POST' })
        log('Audio: carpeta recargada')
        updateAudioUI(data.audio)
        pollStatus()
      } catch (e) {
        log('Audio error: ' + e.message)
      }
    }

    pollStatus()
    setInterval(pollStatus, 5000)
  </script>
</body>
</html>
