name: Deploy Switcher

on:
  workflow_dispatch:
    inputs:
      deploy_dashboard:
        description: "Desplegar dashboard por FTP"
        required: true
        default: true
        type: boolean
      deploy_switcher:
        description: "Desplegar backend switcher al VPS"
        required: true
        default: true
        type: boolean
      debug:
        description: "Activar pasos extra de diagnostico"
        required: false
        default: false
        type: boolean

jobs:
  dashboard:
    if: ${{ inputs.deploy_dashboard }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar secrets FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DESTINATION: ${{ secrets.FTP_DESTINATION }}
        run: |
          set -euo pipefail
          missing=0
          for key in FTP_HOST FTP_USERNAME FTP_PASSWORD FTP_DESTINATION; do
            value="${!key:-}"
            if [ -z "$value" ]; then
              echo "::error::$key no esta definido en GitHub Secrets"
              missing=1
            else
              echo "$key presente"
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Verificar archivos dashboard
        run: |
          set -euo pipefail
          test -f dashboard/index.html
          test -f dashboard/config.js
          test -f dashboard/.htaccess

      - name: Debug dashboard
        if: ${{ inputs.debug }}
        run: |
          set -euo pipefail
          echo "Archivos dashboard:"
          ls -la dashboard

      - name: Deploy dashboard via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: dashboard/
          server-dir: ${{ secrets.FTP_DESTINATION }}
          security: loose
          dangerous-clean-slate: false

  switcher:
    if: ${{ inputs.deploy_switcher }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verificar secrets switcher
        env:
          SWITCHER_HOST: ${{ secrets.SWITCHER_HOST }}
          SWITCHER_PORT: ${{ secrets.SWITCHER_PORT }}
          SWITCHER_USER: ${{ secrets.SWITCHER_USER }}
          SWITCHER_PASSWORD: ${{ secrets.SWITCHER_PASSWORD }}
          SWITCHER_REMOTE_BASE_DIR: ${{ secrets.SWITCHER_REMOTE_BASE_DIR }}
          SWITCHER_REMOTE_SERVICE_DIR: ${{ secrets.SWITCHER_REMOTE_SERVICE_DIR }}
          PORT: ${{ secrets.PORT }}
          KICK_RTMP_URL: ${{ secrets.KICK_RTMP_URL }}
          KICK_STREAM_KEY: ${{ secrets.KICK_STREAM_KEY }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          CHROMIUM_EXECUTABLE_PATH: ${{ secrets.CHROMIUM_EXECUTABLE_PATH }}
          DISPLAY_NUM: ${{ secrets.DISPLAY_NUM }}
          STREAM_WIDTH: ${{ secrets.STREAM_WIDTH }}
          STREAM_HEIGHT: ${{ secrets.STREAM_HEIGHT }}
          STREAM_FPS: ${{ secrets.STREAM_FPS }}
          VIDEO_BITRATE: ${{ secrets.VIDEO_BITRATE }}
          MAXRATE: ${{ secrets.MAXRATE }}
          BUFSIZE: ${{ secrets.BUFSIZE }}
          GOP: ${{ secrets.GOP }}
          PRESET: ${{ secrets.PRESET }}
          AUDIO_BITRATE: ${{ secrets.AUDIO_BITRATE }}
          DEFAULT_URL: ${{ secrets.DEFAULT_URL }}
        run: |
          set -euo pipefail
          missing=0
          for key in \
            SWITCHER_HOST SWITCHER_PORT SWITCHER_USER SWITCHER_PASSWORD \
            SWITCHER_REMOTE_BASE_DIR SWITCHER_REMOTE_SERVICE_DIR \
            PORT KICK_RTMP_URL KICK_STREAM_KEY ALLOWED_ORIGIN API_TOKEN \
            CHROMIUM_EXECUTABLE_PATH DISPLAY_NUM STREAM_WIDTH STREAM_HEIGHT STREAM_FPS \
            VIDEO_BITRATE MAXRATE BUFSIZE GOP PRESET AUDIO_BITRATE DEFAULT_URL; do
            value="${!key:-}"
            if [ -z "$value" ]; then
              echo "::error::$key no esta definido en GitHub Secrets"
              missing=1
            else
              echo "$key presente"
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Validar sintaxis Node
        run: |
          set -euo pipefail
          node --check switcher/server.js
          node --check switcher/user-service.js
          node --check switcher/stream-manager.js
          node --check switcher/playlist-manager.js
          node --check switcher/audio-loop-manager.js
          node --check switcher/settings-manager.js
          node --check switcher/named-playlist-store.js
          node --check switcher/schedule-manager.js
          node --check switcher/log-manager.js
          node --check switcher/telegram-notifier.js

      - name: Armar paquete de deploy
        env:
          PORT: ${{ secrets.PORT }}
          KICK_RTMP_URL: ${{ secrets.KICK_RTMP_URL }}
          KICK_STREAM_KEY: ${{ secrets.KICK_STREAM_KEY }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          CHROMIUM_EXECUTABLE_PATH: ${{ secrets.CHROMIUM_EXECUTABLE_PATH }}
          DISPLAY_NUM: ${{ secrets.DISPLAY_NUM }}
          STREAM_WIDTH: ${{ secrets.STREAM_WIDTH }}
          STREAM_HEIGHT: ${{ secrets.STREAM_HEIGHT }}
          STREAM_FPS: ${{ secrets.STREAM_FPS }}
          VIDEO_BITRATE: ${{ secrets.VIDEO_BITRATE }}
          MAXRATE: ${{ secrets.MAXRATE }}
          BUFSIZE: ${{ secrets.BUFSIZE }}
          GOP: ${{ secrets.GOP }}
          PRESET: ${{ secrets.PRESET }}
          AUDIO_BITRATE: ${{ secrets.AUDIO_BITRATE }}
          DEFAULT_URL: ${{ secrets.DEFAULT_URL }}
        run: |
          set -euo pipefail
          rm -rf deploy_bundle
          mkdir -p deploy_bundle/switcher

          cp switcher/server.js deploy_bundle/switcher/
          cp switcher/user-service.js deploy_bundle/switcher/
          cp switcher/stream-manager.js deploy_bundle/switcher/
          cp switcher/playlist-manager.js deploy_bundle/switcher/
          cp switcher/audio-loop-manager.js deploy_bundle/switcher/
          cp switcher/settings-manager.js deploy_bundle/switcher/
          cp switcher/named-playlist-store.js deploy_bundle/switcher/
          cp switcher/schedule-manager.js deploy_bundle/switcher/
          cp switcher/log-manager.js deploy_bundle/switcher/
          cp switcher/telegram-notifier.js deploy_bundle/switcher/
          cp switcher/package.json deploy_bundle/switcher/
          cp switcher/ecosystem.config.cjs deploy_bundle/switcher/
          cp switcher/.env.example deploy_bundle/switcher/
          cp -r switcher/audio deploy_bundle/switcher/
          cp -r switcher/audio-playlist deploy_bundle/switcher/
          cp -r switcher/video-playlist deploy_bundle/switcher/

          {
            echo "PORT=$PORT"
            echo "KICK_RTMP_URL=$KICK_RTMP_URL"
            echo "KICK_STREAM_KEY=$KICK_STREAM_KEY"
            echo "ALLOWED_ORIGIN=$ALLOWED_ORIGIN"
            echo "API_TOKEN=$API_TOKEN"
            echo "CHROMIUM_EXECUTABLE_PATH=$CHROMIUM_EXECUTABLE_PATH"
            echo "DISPLAY_NUM=$DISPLAY_NUM"
            echo "STREAM_WIDTH=$STREAM_WIDTH"
            echo "STREAM_HEIGHT=$STREAM_HEIGHT"
            echo "STREAM_FPS=$STREAM_FPS"
            echo "VIDEO_BITRATE=$VIDEO_BITRATE"
            echo "MAXRATE=$MAXRATE"
            echo "BUFSIZE=$BUFSIZE"
            echo "GOP=$GOP"
            echo "PRESET=$PRESET"
            echo "AUDIO_BITRATE=$AUDIO_BITRATE"
            echo "DEFAULT_URL=$DEFAULT_URL"
          } > deploy_bundle/switcher/.env

          tar -czf switcher-deploy.tgz -C deploy_bundle switcher

      - name: Debug paquete
        if: ${{ inputs.debug }}
        run: |
          set -euo pipefail
          ls -la
          tar -tzf switcher-deploy.tgz

      - name: Instalar cliente SSH
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Subir paquete al VPS
        env:
          SWITCHER_HOST: ${{ secrets.SWITCHER_HOST }}
          SWITCHER_PORT: ${{ secrets.SWITCHER_PORT }}
          SWITCHER_USER: ${{ secrets.SWITCHER_USER }}
          SWITCHER_PASSWORD: ${{ secrets.SWITCHER_PASSWORD }}
        run: |
          set -euo pipefail
          archive_remote="/tmp/switcher-deploy-${{ github.run_id }}-${{ github.run_attempt }}.tgz"
          echo "ARCHIVE_REMOTE=$archive_remote" >> "$GITHUB_ENV"

          sshpass -p "$SWITCHER_PASSWORD" scp -P "$SWITCHER_PORT" -o StrictHostKeyChecking=no \
            switcher-deploy.tgz "$SWITCHER_USER@$SWITCHER_HOST:$archive_remote"

      - name: Aplicar deploy remoto y reiniciar PM2
        env:
          SWITCHER_HOST: ${{ secrets.SWITCHER_HOST }}
          SWITCHER_PORT: ${{ secrets.SWITCHER_PORT }}
          SWITCHER_USER: ${{ secrets.SWITCHER_USER }}
          SWITCHER_PASSWORD: ${{ secrets.SWITCHER_PASSWORD }}
          SWITCHER_REMOTE_BASE_DIR: ${{ secrets.SWITCHER_REMOTE_BASE_DIR }}
          SWITCHER_REMOTE_SERVICE_DIR: ${{ secrets.SWITCHER_REMOTE_SERVICE_DIR }}
          ARCHIVE_REMOTE: ${{ env.ARCHIVE_REMOTE }}
        run: |
          set -euo pipefail
          password_b64="$(printf '%s' "$SWITCHER_PASSWORD" | base64 -w0)"
          sshpass -p "$SWITCHER_PASSWORD" ssh -p "$SWITCHER_PORT" -o StrictHostKeyChecking=no "$SWITCHER_USER@$SWITCHER_HOST" "
            set -euo pipefail
            SUDO_PW=\$(printf '%s' '$password_b64' | base64 -d)
            mkdir -p '$SWITCHER_REMOTE_SERVICE_DIR/audio' '$SWITCHER_REMOTE_SERVICE_DIR/audio-playlist' '$SWITCHER_REMOTE_SERVICE_DIR/video-playlist' '$SWITCHER_REMOTE_SERVICE_DIR/data'
            if [ '$SWITCHER_USER' = 'root' ]; then
              tar -xzf '$ARCHIVE_REMOTE' -C '$SWITCHER_REMOTE_BASE_DIR'
              rm -f '$ARCHIVE_REMOTE'
              cd '$SWITCHER_REMOTE_SERVICE_DIR'
              npm install --omit=dev
              pm2 restart all || pm2 start '$SWITCHER_REMOTE_SERVICE_DIR/ecosystem.config.cjs'
              pm2 list
            else
              printf '%s\n' \"\$SUDO_PW\" | sudo -S -p '' tar -xzf '$ARCHIVE_REMOTE' -C '$SWITCHER_REMOTE_BASE_DIR'
              printf '%s\n' \"\$SUDO_PW\" | sudo -S -p '' rm -f '$ARCHIVE_REMOTE'
              cd '$SWITCHER_REMOTE_SERVICE_DIR'
              printf '%s\n' \"\$SUDO_PW\" | sudo -S -p '' npm install --omit=dev
              printf '%s\n' \"\$SUDO_PW\" | sudo -S -p '' pm2 restart all || printf '%s\n' \"\$SUDO_PW\" | sudo -S -p '' pm2 start '$SWITCHER_REMOTE_SERVICE_DIR/ecosystem.config.cjs'
              printf '%s\n' \"\$SUDO_PW\" | sudo -S -p '' pm2 list
            fi
          "

      - name: Fin deploy switcher
        run: echo "Deploy switcher completado"
